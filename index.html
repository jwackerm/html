<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Dashboard Home</title>
    <style>
      :root{--bg:#f6f8fb;--card:#fff;--accent:#2563eb;--muted:#6b7280}
      body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:#111;margin:0;padding:0}
      header{background:linear-gradient(90deg,rgba(37,99,235,0.08),transparent);padding:1rem 1.25rem;border-bottom:1px solid rgba(16,24,40,0.04)}
      .container{max-width:1100px;margin:1.25rem auto;padding:0 1.25rem}
      h1{margin:0;font-size:1.25rem}
      nav{margin-top:.5rem}
      .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;margin-top:1rem}
      .card{background:var(--card);padding:1rem;border-radius:8px;box-shadow:0 1px 2px rgba(16,24,40,0.04)}
      footer{color:var(--muted);font-size:.875rem;text-align:center;padding:2rem 0}
    </style>
  </head>
  <body>
    <header>
      <div class="container">
        <h1>Dashboard</h1>
        <nav aria-label="Primary">
          <a href="#">Home</a> • <a href="#">Reports</a> • <a href="#">Settings</a>
        </nav>
      </div>
    </header>
    <main class="container" role="main">
      <section class="grid" aria-label="Overview widgets">
        <article class="card">
          <h2>Welcome</h2>
          <p style="color:var(--muted)">This is a minimal starter for a dashboard home page. Replace these cards with real content.</p>
        </article>
        <article class="card">
          <h2>Stats</h2>
          <p style="color:var(--muted)">Top-level metrics go here.</p>
        </article>
        <article class="card">
          <h2>Activity</h2>
          <p style="color:var(--muted)">Recent activity list or feed.</p>
        </article>
      </section>
    </main>
    <footer>
      <div class="container">&copy; <span id="year"></span> Dashboard • Built with a minimal template</div>
    </footer>
    <script>
      document.getElementById('year').textContent = new Date().getFullYear();
    </script>
  </body>
</html>
